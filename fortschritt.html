<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse</title><script src="https://cdn.tailwindcss.com"></script>
    <style>.dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }</style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div class="max-w-2xl mx-auto bg-white min-h-screen shadow-xl flex flex-col">
        <header class="bg-slate-800 text-white p-5 sticky top-0 z-50 flex items-center border-b-4 border-blue-500">
            <button onclick="window.location.href='index.html'" class="mr-4 p-2 bg-slate-700 rounded-xl"><svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"></path></svg></button>
            <h1 class="text-xl font-black uppercase italic italic">Analyse</h1>
        </header>

        <main class="p-5">
            <div class="mb-6 bg-slate-100 p-5 rounded-2xl">
                <select id="schuelerSelect" onchange="renderAnalyse()" class="w-full p-4 rounded-xl font-black text-slate-800 uppercase"></select>
            </div>

            <div id="statsBereich" class="hidden grid grid-cols-4 gap-2 mb-6">
                <div onclick="setFilter('gruen')" class="bg-emerald-50 border-2 border-emerald-100 p-3 rounded-2xl text-center cursor-pointer shadow-sm">
                    <div id="countGruen" class="text-xl font-black text-emerald-600">0</div>
                    <div class="text-[8px] font-black uppercase">Sicher</div>
                </div>
                <div onclick="setFilter('gelb')" class="bg-amber-50 border-2 border-amber-100 p-3 rounded-2xl text-center cursor-pointer shadow-sm">
                    <div id="countGelb" class="text-xl font-black text-amber-500">0</div>
                    <div class="text-[8px] font-black uppercase">Hilfe</div>
                </div>
                <div onclick="setFilter('rot')" class="bg-rose-50 border-2 border-rose-100 p-3 rounded-2xl text-center cursor-pointer shadow-sm">
                    <div id="countRot" class="text-xl font-black text-rose-500">0</div>
                    <div class="text-[8px] font-black uppercase">Defizit</div>
                </div>
                <div onclick="setFilter('offen')" class="bg-slate-100 border-2 border-slate-200 p-3 rounded-2xl text-center cursor-pointer shadow-sm">
                    <div id="countOffen" class="text-xl font-black text-slate-400">0</div>
                    <div class="text-[8px] font-black uppercase">Offen</div>
                </div>
            </div>

            <div id="progressContainer" class="hidden mb-6 bg-slate-50 p-4 rounded-2xl">
                <div class="flex justify-between mb-1"><span class="text-[9px] font-black uppercase">Fortschritt</span><span id="prozentText" class="text-sm font-black text-blue-600">0%</span></div>
                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden"><div id="prozentBalken" class="bg-blue-600 h-full transition-all duration-1000"></div></div>
            </div>

            <div id="analyseContent" class="space-y-3"></div>
        </main>
    </div>

    <script>
        let currentFilter = 'all';
        const kKatalog = ["Einweisung Fzg", "Techn. Durchsichten", "Ladungssicherung", "Fahrtechn. Vorber.", "Führung Fahrauftrag", "Handhabung Bedien.", "EG-Kontrollgerät", "Anf/Sch/Lenk", "Geringe Geschw.", "Abbremsen", "Rückwärts m. Einw.", "An/Abkuppeln", "Verlassen Fzg", "Anfahren", "Gangwechsel", "Fahrbahnbenutzung", "Abbiegen", "Fahrstreifenwechsel", "Beobachtung", "Verkehrszeichen", "Geschwindigkeit", "Sicherheitsabstände", "Überholen/Vorbeif.", "Lichtzeichen/Polizei", "mit/ohne Zeichen", "Kreisverkehr", "Bahnübergänge", "Fußgänger/Rad", "Fußgängerüberwege", "Verk.beruhigt. Ber.", "Haltende öfftl. VKM", "Engstellen", "Warneinrichtungen", "Liegenbleiben", "Wenden/Rückwärts", "Feld/Wald/Wiese", "Bodenverhältnisse", "Materialschonung", "Geschw./Gangwahl", "Geländegang/Sperre", "Spuren/Lenkrad", "Gefahrbremsung", "Ausweichen", "Steigung/Gefälle", "Bodenunebenheiten", "Geländebeurteilung", "Abfahrtkontrolle", "Sicherheitskontrolle", "Verbinden/Trennen", "Abstellen Anhänger", "Parklücke (C)", "Quer/Schräg (C)", "Rückwärts Rechts (C)", "Rampe Rechts (C)", "Rampe Gerade (CE)", "Umkehren Links (CE)", "Vorausschauen", "Verkehrsteilnehmer", "Fahrverhalten andere", "Verkehrsraum", "Gefahrbremsung", "Überland (C)", "Autobahn (C)", "Nacht (C)", "Überland (CE)", "Autobahn (CE)", "Nacht (CE)", "Kompl. Situationen", "Risiko-Vermeidung", "Unbek. Verkehrsraum", "Prüfungsbeding.", "Prüfungsreife", "Tag (min)", "Nacht (min)"];

        function setFilter(f) { currentFilter = (currentFilter === f) ? 'all' : f; renderAnalyse(); }

        function renderAnalyse() {
            const id = document.getElementById('schuelerSelect').value; if(!id) return;
            const container = document.getElementById('analyseContent');
            const fahrten = (JSON.parse(localStorage.getItem('bw_ausbildungsstand')) || []).filter(f => f.schuelerId === id).sort((a,b) => new Date(a.datum) - new Date(b.datum));
            
            document.getElementById('statsBereich').classList.remove('hidden');
            document.getElementById('progressContainer').classList.remove('hidden');

            let stand = {}; let counts = {gruen:0, gelb:0, rot:0, offen:0};
            fahrten.forEach(f => { for(let i=1; i<=74; i++) if(f[`item_${i}`]) stand[i] = f[`item_${i}`]; });

            for(let i=1; i<=74; i++) { const s = stand[i] || 'offen'; counts[s]++; }
            ['gruen','gelb','rot','offen'].forEach(k => document.getElementById('count'+k.charAt(0).toUpperCase()+k.slice(1)).textContent = counts[k]);
            const p = Math.round((counts.gruen/74)*100); document.getElementById('prozentText').textContent = p+'%'; document.getElementById('prozentBalken').style.width = p+'%';

            container.innerHTML = '';
            for(let i=1; i<=74; i++) {
                const s = stand[i] || 'offen';
                if(currentFilter !== 'all' && s !== currentFilter) continue;
                const col = {gruen:'bg-emerald-500', gelb:'bg-amber-400', rot:'bg-rose-500', offen:'bg-slate-200'}[s];
                container.innerHTML += `<div class="p-3 flex items-center justify-between border-b text-[11px] font-bold"><span class="text-slate-500 mr-2">${i}</span><span class="flex-1">${kKatalog[i-1]}</span><span class="dot ${col}"></span></div>`;
            }

            // Notizen Historie (Chronologisch)
            let notesHtml = '';
            fahrten.reverse().forEach(f => {
                const keys = ['notizen_grundstufe','notizen_aufbauA','notizen_aufbauB','notizen_aufbauC','notizen_leistung','notizen_reifestufe'];
                keys.forEach(k => { if(f[k]) notesHtml += `<div class="p-2 mb-2 bg-blue-50 border-l-2 border-blue-400 text-[10px] font-bold"># ${new Date(f.datum).toLocaleDateString()}: ${f[k]}</div>`; });
            });
            if(notesHtml) container.innerHTML += `<div class="mt-8 border-t pt-4 font-black uppercase text-[10px] text-slate-400 italic">Verlauf Notizen</div>` + notesHtml;
        }

        const ids = JSON.parse(localStorage.getItem('bw_aktive_schueler')) || [];
        const sel = document.getElementById('schuelerSelect');
        sel.innerHTML = '<option disabled selected>Fahrschüler wählen...</option>';
        ids.forEach(id => sel.innerHTML += `<option value="${id}">${id}</option>`);
    </script>
</body>
</html>
