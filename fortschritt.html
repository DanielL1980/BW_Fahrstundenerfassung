<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analyse - BW Fahrschul-Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .bg-rot { background-color: #f43f5e; }
        .bg-gelb { background-color: #fbbf24; }
        .bg-gruen { background-color: #10b981; }
        .bg-leer { background-color: #e2e8f0; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; text-transform: uppercase; }
        .badge-c { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .badge-ce { background-color: #dcfce7; color: #166534; border: 1px solid #4ade80; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased pb-20">

    <div class="max-w-2xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col border-x border-slate-200">
        
        <header class="bg-slate-800 text-white p-6 sticky top-0 z-50 shadow-lg flex items-center justify-between border-b-4 border-blue-500">
            <div class="flex items-center">
                <button onclick="window.location.href='index.html'" class="mr-4 p-2 bg-slate-700 rounded-xl hover:bg-slate-600 transition-all">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div>
                    <h1 class="text-xl font-black tracking-tight uppercase italic">Ausbildungsstand</h1>
                    <p class="text-[10px] text-blue-300 font-bold uppercase tracking-widest italic">Analyse & Fortschritt</p>
                </div>
            </div>
        </header>

        <main class="p-5 flex-1">
            <div class="mb-6">
                <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase tracking-widest italic">Fahrschüler wählen</label>
                <select id="schuelerSelect" onchange="renderAnalyse()" class="w-full p-4 rounded-2xl border-2 border-slate-200 bg-slate-50 font-black text-slate-800 shadow-sm outline-none focus:border-blue-500 transition-all italic uppercase"></select>
            </div>

            <div id="analyseContent" class="space-y-4">
                <div class="p-10 text-center text-slate-400 font-bold italic uppercase text-xs">Bitte Schüler auswählen...</div>
            </div>
        </main>
    </div>

    <script>
        const katalog = {
            grundstufe: { title: "Grundstufe (1-13)", items: [
                {id: 1, text: "Einweisung Fahrzeug"}, {id: 2, text: "Techn. Durchsichten"}, {id: 3, text: "Ladungssicherung"}, {id: 4, text: "Fahrtechn. Vorber."}, {id: 5, text: "Führung Fahrauftrag"}, {id: 6, text: "Bedienungseinricht."}, {id: 7, text: "EG-Kontrollgerät"}, {id: 8, text: "Anfahr/Schalt/Lenk"}, {id: 9, text: "Geringe Geschw."}, {id: 10, text: "Abbremsen"}, {id: 11, text: "Rückwärts m. Einw."}, {id: 12, text: "An/Abkuppeln"}, {id: 13, text: "Verlassen d. Fzg"}
            ], noteKey: "notizen_grundstufe" },
            aufbaustufeA: { title: "Aufbaustufe A (14-35)", items: [
                {id: 14, text: "Anfahren Ebene/Berg"}, {id: 15, text: "Gangwechsel"}, {id: 16, text: "Fahrbahnbenutzung"}, {id: 17, text: "Abbiegen"}, {id: 18, text: "Fahrstreifenwechsel"}, {id: 19, text: "Beobachtung"}, {id: 20, text: "Verkehrszeichen"}, {id: 21, text: "Geschwindigkeit"}, {id: 22, text: "Sicherheitsabstände"}, {id: 23, text: "Überholen/Vorbeif."}, {id: 24, text: "Lichtzeichen/Polizei"}, {id: 25, text: "mit/ohne Zeichen"}, {id: 26, text: "Kreisverkehr"}, {id: 27, text: "Bahnübergänge"}, {id: 28, text: "Fußgänger/Radfahrer"}, {id: 29, text: "Fußgängerüberwege"}, {id: 30, text: "Verk.beruhigt. Ber."}, {id: 31, text: "Haltende öfftl. VKM"}, {id: 32, text: "Engstellen"}, {id: 33, text: "Warneinrichtungen"}, {id: 34, text: "Liegenbleiben"}, {id: 35, text: "Wenden/Rückwärts"}
            ], noteKey: "notizen_aufbauA" },
            aufbaustufeB: { title: "Aufbaustufe B (36-46)", items: [
                {id: 36, text: "Feld/Wald/Wiese"}, {id: 37, text: "Bodenverhältnisse"}, {id: 38, text: "Materialschonung"}, {id: 39, text: "Geschw./Gangwahl"}, {id: 40, text: "Geländegang/Sperre"}, {id: 41, text: "Spuren/Lenkrad"}, {id: 42, text: "Gefahrbremsung"}, {id: 43, text: "Ausweichen"}, {id: 44, text: "Steigung/Gefälle"}, {id: 45, text: "Bodenunebenheiten"}, {id: 46, text: "Geländebeurteilung"}
            ], noteKey: "notizen_aufbauB" },
            aufbaustufeC: { title: "Aufbaustufe C (47-56)", items: [
                {id: 47, text: "Abfahrtkontrolle"}, {id: 48, text: "Sicherheitskontrolle"}, {id: 49, text: "Verbinden/Trennen"}, {id: 50, text: "Abstellen Anhänger"}, {id: 51, text: "Parklücke (C)"}, {id: 52, text: "Quer/Schräg (C)"}, {id: 53, text: "Rückwärts Rechts (C)"}, {id: 54, text: "Rampe Rechts (C)"}, {id: 55, text: "Rampe Gerade (CE)"}, {id: 56, text: "Umkehren Links (CE)"}
            ], noteKey: "notizen_aufbauC" },
            leistung: { title: "Leistungsstufe A & Sonderfahrten", items: [
                {id: 57, text: "Vorausschauen"}, {id: 58, text: "Verkehrsteilnehmer"}, {id: 59, text: "Fahrverhalten andere"}, {id: 60, text: "Verkehrsraum"}, {id: 61, text: "Gefahrbremsung"}, {id: 62, text: "Überland (C)", badge: "c"}, {id: 63, text: "Autobahn (C)", badge: "c"}, {id: 64, text: "Nachtfahrt (C)", badge: "c"}, {id: 65, text: "Überland (CE)", badge: "ce"}, {id: 66, text: "Autobahn (CE)", badge: "ce"}, {id: 67, text: "Nachtfahrt (CE)", badge: "ce"}
            ], noteKey: "notizen_leistung" },
            reife: { title: "Reife & Einweiser", items: [
                {id: 68, text: "Kompl. Situationen"}, {id: 69, text: "Risiko-Vermeidung"}, {id: 70, text: "Unbek. Verkehrsraum"}, {id: 71, text: "Prüfungsbeding."}, {id: 72, text: "Prüfungsreife"}, {id: 73, text: "Einweiser Tag (min)"}, {id: 74, text: "Einweiser Nacht (min)"}
            ], noteKey: "notizen_reifestufe" }
        };

        function renderAnalyse() {
            const schuelerId = document.getElementById('schuelerSelect').value;
            const container = document.getElementById('analyseContent');
            if(!schuelerId) return;

            const alleFahrten = JSON.parse(localStorage.getItem('bw_ausbildungsstand')) || [];
            const fahrten = alleFahrten.filter(f => f.schuelerId === schuelerId).sort((a,b) => new Date(a.datum) - new Date(b.datum));

            if(fahrten.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold italic uppercase text-xs">Keine Daten vorhanden.</div>';
                return;
            }

            container.innerHTML = '';
            
            Object.keys(katalog).forEach(key => {
                const section = katalog[key];
                let sectionHtml = `<details class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4">
                    <summary class="p-5 font-black text-xs text-slate-500 bg-slate-50/50 cursor-pointer flex justify-between items-center uppercase tracking-widest">${section.title}</summary>
                    <div class="p-4 space-y-2">`;

                // Items Rendern
                section.items.forEach(item => {
                    let lastStatus = 'leer';
                    let totalCount = 0;
                    fahrten.forEach(f => {
                        if(f[`item_${item.id}`]) lastStatus = f[`item_${item.id}`];
                        if(f[`count_${item.id}`]) totalCount += parseInt(f[`count_${item.id}`]);
                    });

                    sectionHtml += `<div class="flex items-center justify-between text-[11px] border-b border-slate-50 pb-2 last:border-0">
                        <span class="font-bold text-slate-600">${item.id}. ${item.text} ${item.badge ? `<span class="badge badge-${item.badge}">${item.badge}</span>`:''}</span>
                        <div class="flex items-center">
                            <span class="mr-4 font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-[10px]">${totalCount}</span>
                            <span class="dot bg-${lastStatus}"></span>
                        </div>
                    </div>`;
                });

                // Notizen-Historie (Logbuch)
                let notesHtml = '';
                fahrten.forEach(f => {
                    if(f[section.noteKey]) {
                        const date = new Date(f.datum).toLocaleDateString('de-DE');
                        notesHtml += `<div class="mt-2 p-2 bg-slate-100 rounded-lg text-[10px] border-l-2 border-slate-300">
                            <span class="font-black text-slate-500 uppercase text-[8px]">${date}:</span><br>
                            <span class="font-bold text-slate-700 italic">"${f[section.noteKey]}"</span>
                        </div>`;
                    }
                });

                if(notesHtml) {
                    sectionHtml += `<div class="mt-4 pt-4 border-t border-slate-100">
                        <p class="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Verlauf Bemerkungen</p>
                        ${notesHtml}
                    </div>`;
                }

                sectionHtml += `</div></details>`;
                container.innerHTML += sectionHtml;
            });
        }

        // Init
        const schuelerIds = JSON.parse(localStorage.getItem('bw_aktive_schueler')) || [];
        const select = document.getElementById('schuelerSelect');
        select.innerHTML = '<option value="" disabled selected>Fahrschüler wählen...</option>';
        schuelerIds.forEach(id => select.innerHTML += `<option value="${id}">${id}</option>`);
    </script>
</body>
</html>
