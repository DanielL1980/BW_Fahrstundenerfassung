<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BW Fahrschul-Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased pb-24">

<div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">

<header class="bg-slate-800 text-white p-6 rounded-b-3xl shadow-lg border-b-4 border-blue-600">
<div class="flex justify-between items-center mb-2">
<h1 class="text-xl font-black uppercase italic">Fahrschul-App</h1>
<span id="current-date" class="text-xs bg-slate-700 px-3 py-1 rounded-full text-blue-200 font-bold"></span>
</div>
<p class="text-xs text-slate-400 uppercase">Dienst-Modus • Online-Sync</p>
</header>

<main class="flex-1 p-5">

<h2 class="text-xs font-black mb-4 text-slate-400 uppercase tracking-widest">
Daten-Transfer
</h2>

<button onclick="exportiereDaten()" 
class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-900 active:scale-95 uppercase text-xs tracking-widest transition-all">
Daten an Nextcloud übertragen
</button>

<div id="syncStatus" class="mt-4 text-xs font-bold text-center text-slate-500"></div>

</main>
</div>

<script>

document.getElementById('current-date').textContent =
new Date().toLocaleDateString('de-DE');



/* ======================================================
   ✅ NEXTCLOUD KONFIGURATION
   HIER ANPASSEN
====================================================== */

const NEXTCLOUD_URL = "https://nextcloud.auf.bundeswehr.de/remote.php/dav/files/10182872%40auf.bundeswehr.de";
const NC_USER = "fahrlehrer_sync";
const NC_APP_PASS = "F5Fak-5GHNF-ymgTr-rJYGM-Xft2J";



/* ======================================================
   ✅ EXPORT FUNKTION
====================================================== */

async function exportiereDaten() {

const fahrten = JSON.parse(localStorage.getItem('bw_ausbildungsstand')) || [];
const ids = JSON.parse(localStorage.getItem('bw_aktive_schueler')) || [];

const exportData = {
typ: "Gesamt_Backup",
schuelerIDs: ids,
alleFahrten: fahrten,
exportDatum: new Date().toISOString()
};

const dateiname = "BW_SYNC_" + new Date().toISOString().split("T")[0] + ".json";

await uploadToNextcloud(dateiname, exportData);

}



/* ======================================================
   ✅ UPLOAD MIT OFFLINE QUEUE
====================================================== */

async function uploadToNextcloud(filename, dataObj) {

const statusBox = document.getElementById("syncStatus");
statusBox.textContent = "Übertragung läuft...";

const jsonString = JSON.stringify(dataObj, null, 2);
const blob = new Blob([jsonString], { type: "application/json" });

try {

const response = await fetch(NEXTCLOUD_URL + filename, {
method: "PUT",
headers: {
"Authorization": "Basic " + btoa(NC_USER + ":" + NC_APP_PASS),
"Content-Type": "application/json"
},
body: blob
});

if (!response.ok) throw new Error("Upload fehlgeschlagen");

statusBox.textContent = "✅ Erfolgreich synchronisiert.";
return true;

} catch (err) {

queueUpload(filename, dataObj);
statusBox.textContent = "⚠️ Keine Verbindung – wird automatisch nachgesendet.";
return false;

}
}



/* ======================================================
   ✅ OFFLINE WARTESCHLANGE
====================================================== */

function queueUpload(filename, dataObj) {

let queue = JSON.parse(localStorage.getItem("uploadQueue")) || [];
queue.push({ filename, data: dataObj });
localStorage.setItem("uploadQueue", JSON.stringify(queue));

}



async function processQueue() {

let queue = JSON.parse(localStorage.getItem("uploadQueue")) || [];
if (queue.length === 0) return;

const statusBox = document.getElementById("syncStatus");
statusBox.textContent = "Versuche gespeicherte Dateien zu synchronisieren...";

let newQueue = [];

for (let item of queue) {

try {

const response = await fetch(NEXTCLOUD_URL + item.filename, {
method: "PUT",
headers: {
"Authorization": "Basic " + btoa(NC_USER + ":" + NC_APP_PASS),
"Content-Type": "application/json"
},
body: new Blob([JSON.stringify(item.data)], { type: "application/json" })
});

if (!response.ok) throw new Error();

} catch {
newQueue.push(item);
}

}

localStorage.setItem("uploadQueue", JSON.stringify(newQueue));

if (newQueue.length === 0)
statusBox.textContent = "✅ Alle wartenden Dateien synchronisiert.";
else
statusBox.textContent = "⚠️ Einige Dateien konnten noch nicht übertragen werden.";

}



window.addEventListener("online", processQueue);
processQueue();

</script>

</body>
</html>
